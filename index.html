<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Simple Page</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#f4f6f8;
            margin:0;
        }

        header{
            background:#2c7be5;
            color:white;
            padding:15px;
            text-align:center;
        }

        .container{
            width:80%;
            margin:40px auto;
            text-align:center;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:8px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
        }

        button{
            background:#2c7be5;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#1a5fc1;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome</h1>
</header>

<div class="container">
    <div class="card">
        <h2>Hello!</h2>
        <p>This is a simple HTML page.</p>
        <button>Click Me</button>
    </div>
</div>

</body>
</html>
